# Options JVM du démon Gradle.
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
# Compilation parallèle des modules (un seul pour l'instant, mais prêt pour le multi-module).
org.gradle.parallel=true
org.gradle.caching=true
# AndroidX obligatoire pour Compose.
android.useAndroidX=true
# Génère uniquement les ressources des classes réellement utilisées.
android.nonTransitiveRClass=true
# Kotlin : style de code officiel.
kotlin.code.style=official
